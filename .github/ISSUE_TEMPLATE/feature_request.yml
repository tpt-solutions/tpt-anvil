name: Feature Request
description: Suggest a new feature or enhancement for TPT Anvil
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternative approaches?

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Inference engine
        - Cloud providers
        - Code indexer
        - VS Code extension
        - JetBrains plugin
        - Slash commands
        - Configuration
        - Distribution / packaging
        - Documentation
        - Other
    validations:
      required: true
