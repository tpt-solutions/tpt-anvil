name: Bug Report
description: Report a reproducible bug in TPT Anvil
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Anvil Version
      placeholder: "e.g. v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: dropdown
    id: ide
    attributes:
      label: IDE
      options:
        - VS Code
        - JetBrains (IntelliJ IDEA)
        - JetBrains (PyCharm)
        - JetBrains (other)
        - CLI / standalone
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open a project
        2. Run /generate with...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output from `~/.local/share/anvil/anvil.log`
      render: shell
