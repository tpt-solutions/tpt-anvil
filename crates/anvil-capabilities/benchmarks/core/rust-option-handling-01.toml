id = "rust-option-handling-01"
description = "Fix missing None handling for Option return type"
language = "rust"
kind = "compiler"
introduced_at = "2026-01-01"
retires_at = "2026-07-01"
scaffold_path = "scaffold/rust"
target_file = "main.rs"

prompt = """
The function `first_positive` returns an `Option<i32>` but the caller
in `main()` does not handle the `None` case properly — it uses `unwrap()`
which panics on an empty slice. Fix the code so it handles both `Some`
and `None` cases gracefully with a message, and also ensure the function
itself is correct. Output the complete corrected file.
"""

[verify_overrides]
run_tests = false
run_linter = false
timeout_seconds = 30
